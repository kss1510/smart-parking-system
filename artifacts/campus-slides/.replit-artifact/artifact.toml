kind = "slides"
previewPath = "/campus-slides/"
title = "GITAM CampusPark Presentation"
version = "1.0.0"
id = "artifacts/campus-slides"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/campus-slides/" ]
localPort = 20796

[services.development]
run = "pnpm --filter @workspace/campus-slides run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/campus-slides", "run", "build" ]
publicDir = "artifacts/campus-slides/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20796"
BASE_PATH = "/campus-slides/"
